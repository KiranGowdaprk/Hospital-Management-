<!DOCTYPE html>
<html>
<head>
<title>Hospital Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(to right,#4facfe,#00f2fe);
}

/* LOGIN */

#loginPage,#registerPage{
text-align:center;
padding-top:80px;
}

.box{
background:white;
padding:20px;
width:90%;
max-width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input,select{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.logout{
float:right;
background:red;
}

/* HOME */

#homePage{
display:none;
padding:15px;
background:#f0f8ff;
min-height:100vh;
}

h1{
text-align:center;
background:#007bff;
color:white;
padding:10px;
border-radius:5px;
}

.section{
background:white;
padding:20px;
margin:20px auto;
width:90%;
max-width:500px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

table,th,td{
border:1px solid black;
}

th{
background:#007bff;
color:white;
}

td{
text-align:center;
padding:8px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">
<div class="box">

<h2>Login</h2>

<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<button onclick="showRegister()">Create Account</button>

<p id="error"></p>

</div>
</div>


<!-- REGISTER -->

<div id="registerPage" style="display:none">
<div class="box">

<h2>Create Account</h2>

<input type="text" id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">Register</button>

<br><br>

<button onclick="showLogin()">Back</button>

</div>
</div>


<!-- HOME -->

<div id="homePage">

<button class="logout" onclick="logout()">Logout</button>

<h1>Hospital Management System</h1>

<!-- ADD PATIENT -->

<div class="section">

<h3>Add Patient</h3>

<input type="text" id="pname" placeholder="Patient Name">
<input type="number" id="page" placeholder="Age">
<input type="text" id="pdisease" placeholder="Disease">

<select id="pdoctor">
<option value="">Select Doctor</option>
<option>Dr Ravi</option>
<option>Dr Meena</option>
<option>Dr Kumar</option>
</select>

<button onclick="addPatient()">Add Patient</button>

</div>


<table id="patientTable">
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Doctor</th>
</tr>
</table>


<!-- APPOINTMENT -->

<div class="section">

<h3>Book Appointment</h3>

<select id="apatient">
<option value="">Select Patient</option>
</select>

<select id="adoctor">
<option value="">Select Doctor</option>
<option>Dr Ravi</option>
<option>Dr Meena</option>
<option>Dr Kumar</option>
</select>

<input type="date" id="adate">
<input type="time" id="atime">

<button onclick="bookAppointment()">Book Appointment</button>

</div>


<table id="appointmentTable">

<tr>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Receipt</th>
</tr>

</table>

</div>


<script>

let currentUser=null;

/* PAGE SWITCH */

function showRegister(){
loginPage.style.display="none";
registerPage.style.display="block";
}

function showLogin(){
registerPage.style.display="none";
loginPage.style.display="block";
}

/* REGISTER */

function register(){

let user=regUser.value;
let pass=regPass.value;

let users=JSON.parse(localStorage.getItem("users"))||[];

users.push({username:user,password:pass});

localStorage.setItem("users",JSON.stringify(users));

alert("Account Created");

showLogin();

}

/* LOGIN */

function login(){

let user=loginUser.value;
let pass=loginPass.value;

let users=JSON.parse(localStorage.getItem("users"))||[];

let found=users.find(u=>u.username===user && u.password===pass);

if(found){

currentUser=user;

loginPage.style.display="none";
homePage.style.display="block";

loadPatients();
loadAppointments();

}
else{
error.innerText="Invalid Login";
}

}

/* LOGOUT */

function logout(){

currentUser=null;

homePage.style.display="none";
loginPage.style.display="block";

}

/* ADD PATIENT */

function addPatient(){

let name=pname.value;
let age=page.value;
let disease=pdisease.value;
let doctor=pdoctor.value;

let patients=JSON.parse(localStorage.getItem("patients_"+currentUser))||[];

let patient={
id:patients.length+1,
name:name,
age:age,
disease:disease,
doctor:doctor
};

patients.push(patient);

localStorage.setItem("patients_"+currentUser,JSON.stringify(patients));

pname.value="";
page.value="";
pdisease.value="";
pdoctor.value="";

loadPatients();

}

/* LOAD PATIENTS */

function loadPatients(){

let table=patientTable;

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Doctor</th>
</tr>`;

let select=apatient;

select.innerHTML='<option>Select Patient</option>';

let patients=JSON.parse(localStorage.getItem("patients_"+currentUser))||[];

patients.forEach((p,i)=>{

let row=table.insertRow();

row.insertCell(0).innerText=p.id;
row.insertCell(1).innerText=p.name;
row.insertCell(2).innerText=p.age;
row.insertCell(3).innerText=p.disease;
row.insertCell(4).innerText=p.doctor;

let option=document.createElement("option");
option.value=p.name;
option.text=p.name;

select.appendChild(option);

});

}

/* BOOK APPOINTMENT */

function bookAppointment(){

let patient=apatient.value;
let doctor=adoctor.value;
let date=adate.value;
let time=atime.value;

let appointments=JSON.parse(localStorage.getItem("appointments_"+currentUser))||[];

appointments.push({patient,doctor,date,time});

localStorage.setItem("appointments_"+currentUser,JSON.stringify(appointments));

loadAppointments();

}

/* LOAD APPOINTMENTS */

function loadAppointments(){

let table=appointmentTable;

table.innerHTML=`
<tr>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Receipt</th>
</tr>`;

let appointments=JSON.parse(localStorage.getItem("appointments_"+currentUser))||[];

appointments.forEach((a,i)=>{

let row=table.insertRow();

row.insertCell(0).innerText=a.patient;
row.insertCell(1).innerText=a.doctor;
row.insertCell(2).innerText=a.date;
row.insertCell(3).innerText=a.time;

let btn=row.insertCell(4);

btn.innerHTML=`<button onclick="downloadReceipt(${i})">Receipt</button>`;

});

}

/* DOWNLOAD PDF RECEIPT */

function downloadReceipt(i){

let appointments=JSON.parse(localStorage.getItem("appointments_"+currentUser));

let a=appointments[i];

const { jsPDF } = window.jspdf;

let doc=new jsPDF();

doc.setFontSize(18);
doc.text("Hospital Appointment Receipt",20,20);

doc.setFontSize(12);

doc.text("User: "+currentUser,20,40);

doc.text("Patient: "+a.patient,20,60);
doc.text("Doctor: "+a.doctor,20,75);
doc.text("Date: "+a.date,20,90);
doc.text("Time: "+a.time,20,105);

doc.text("Status: Confirmed",20,130);

doc.save(a.patient+"_receipt.pdf");

}

</script>

</body>
</html>
